id: mlir_aie_mlir_aie_cpp_tagged_int32_to_int32
label: mlir_aie_cpp_tagged_int32_to_int32
category: '[mlir_aie]'

templates:
  imports: from gnuradio import mlir_aie
  make: mlir_aie.mlir_aie_cpp_tagged_int32_to_int32(${path_xclbin}, ${path_insts_bin}, ${kernel_name}, ${VECTOR_SIZE})

parameters:
- id: path_xclbin
  label: path_xclbin
  dtype: file_open
  default: 'aie-kernel-src/build/final.xclbin'

- id: path_insts_bin
  label: path_insts_bin
  dtype: file_open
  default: 'aie-kernel-src/build/insts.bin'

- id: kernel_name
  label: kernel_name
  dtype: string
  default: 'MLIR_AIE'

- id: VECTOR_SIZE
  label: VECTOR_SIZE
  dtype: int
  default: 4096

inputs:
-   label: in
    domain: stream
    dtype: int

outputs:
-   label: out
    domain: stream
    dtype: int

file_format: 1
