id: mlir_aie_mlir_aie_cpp_int32_source_1arg
label: mlir_aie_cpp_int32_source_1arg
category: '[mlir_aie]'

templates:
  imports: from gnuradio import mlir_aie
  make: mlir_aie.mlir_aie_cpp_int32_source_1arg(${path_xclbin}, ${path_insts_bin}, ${kernel_name}, ${VECTOR_SIZE}, ${arg1})

#  Make one 'parameters' list entry for every parameter you want settable from the GUI.
#     Keys include:
#     * id (makes the value accessible as keyname, e.g. in the make entry)
#     * label (label shown in the GUI)
#     * dtype (e.g. int, float, complex, byte, short, xxx_vector, ...)
#     * default
parameters:
- id: path_xclbin
  label: path_xclbin
  dtype: file_open
  default: 'aie-kernel-src/build/final.xclbin'

- id: path_insts_bin
  label: path_insts_bin
  dtype: file_open
  default: 'aie-kernel-src/build/insts.bin'

- id: kernel_name
  label: kernel_name
  dtype: string
  default: 'MLIR_AIE'

- id: VECTOR_SIZE
  label: VECTOR_SIZE
  dtype: int
  default: 4096
  
- id: arg1
  label: arg1_float
  dtype: float
  default: 0.5
  
inputs:
#- label: ...
#  domain: ...
#  dtype: ...
#  vlen: ...
#  optional: ...

outputs:
-   label: out
    domain: stream
    dtype: int

#  'file_format' specifies the version of the GRC yml format used in the file
#  and should usually not be changed.
file_format: 1
