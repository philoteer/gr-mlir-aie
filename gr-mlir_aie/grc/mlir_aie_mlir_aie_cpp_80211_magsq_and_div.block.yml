id: mlir_aie_mlir_aie_cpp_80211_magsq_and_div
label: mlir_aie_cpp_80211_magsq_and_div
category: '[mlir_aie]'

templates:
  imports: from gnuradio import mlir_aie
  make: mlir_aie.mlir_aie_cpp_80211_magsq_and_div(${path_xclbin}, ${path_insts_bin}, ${kernel_name}, ${VECTOR_SIZE})

parameters:
- id: path_xclbin
  label: path_xclbin
  dtype: file_open
  default: 'aie-kernel-src/build/final.xclbin'

- id: path_insts_bin
  label: path_insts_bin
  dtype: file_open
  default: 'aie-kernel-src/build/insts.bin'

- id: kernel_name
  label: kernel_name
  dtype: string
  default: 'MLIR_AIE'

- id: VECTOR_SIZE
  label: VECTOR_SIZE
  dtype: int
  default: 4096

#  Make one 'inputs' list entry per input and one 'outputs' list entry per output.
#  Keys include:
#      * label (an identifier for the GUI)
#      * domain (optional - stream or message. Default is stream)
#      * dtype (e.g. int, float, complex, byte, short, xxx_vector, ...)
#      * vlen (optional - data stream vector length. Default is 1)
#      * optional (optional - set to 1 for optional inputs. Default is 0)
inputs:
- label: ac_in
  domain: stream
  dtype: complex

- label: mag_in
  domain: stream
  dtype: float

outputs:
- label: out
  domain: stream
  dtype: float

#  'file_format' specifies the version of the GRC yml format used in the file
#  and should usually not be changed.
file_format: 1
